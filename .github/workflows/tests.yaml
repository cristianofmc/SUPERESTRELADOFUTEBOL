name: Automated Tests

on: pull_request

jobs:
  install:
    name: Install & Debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dump npm debug log on failure
        if: failure()
        run: |
          echo "Dumping npm logs..."
          cat /home/runner/.npm/_logs/*.log

  vitest:
    name: Vitest Tests on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"

      - name: Install dependencies
        run: npm ci

      - name: Setup Podman Service
        run: |
          systemctl --user start podman.socket
          echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV

      - name: Run Tests
        run: npm test
